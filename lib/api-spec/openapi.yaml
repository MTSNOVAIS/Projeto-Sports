openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: La Liga Brasil API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Article operations
  - name: teams
    description: Team operations
  - name: categories
    description: Category operations
  - name: admin
    description: Admin operations
  - name: scraper
    description: News scraper operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List published articles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"

  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all La Liga teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /teams/{slug}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWithArticles"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /admin/articles:
    get:
      operationId: adminListArticles
      tags: [admin]
      summary: List all articles (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, scheduled]
        - name: category
          in: query
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: integer
        - name: source
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"
    post:
      operationId: createArticle
      tags: [admin]
      summary: Create article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleRequest"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /admin/articles/{id}:
    get:
      operationId: adminGetArticle
      tags: [admin]
      summary: Get article by id (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    put:
      operationId: updateArticle
      tags: [admin]
      summary: Update article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleRequest"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [admin]
      summary: Delete article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/articles/{id}/publish:
    post:
      operationId: publishArticle
      tags: [admin]
      summary: Publish article immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /admin/articles/{id}/schedule:
    post:
      operationId: scheduleArticle
      tags: [admin]
      summary: Schedule article for future publish
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleArticleRequest"
      responses:
        "200":
          description: Scheduled article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /admin/teams:
    get:
      operationId: adminListTeams
      tags: [admin]
      summary: List teams (admin)
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [admin]
      summary: Create team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /admin/teams/{id}:
    put:
      operationId: updateTeam
      tags: [admin]
      summary: Update team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /scraper/sources:
    get:
      operationId: listSources
      tags: [scraper]
      summary: List configured news sources
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsSource"

  /scraper/fetch:
    post:
      operationId: fetchFromSource
      tags: [scraper]
      summary: Fetch and translate articles from a source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchSourceRequest"
      responses:
        "200":
          description: Fetched articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchSourceResponse"

  /scraper/translate:
    post:
      operationId: translateArticle
      tags: [scraper]
      summary: Translate article content using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "200":
          description: Translated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"

  /stats:
    get:
      operationId: getSiteStats
      tags: [admin]
      summary: Get site statistics
      responses:
        "200":
          description: Site stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, scheduled]
        featured:
          type: boolean
        breakingNews:
          type: boolean
        category:
          type: string
        authorName:
          type: string
        teamId:
          type: integer
          nullable: true
        teamName:
          type: string
          nullable: true
        teamSlug:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        sourceName:
          type: string
          nullable: true
        publishedAt:
          type: string
          nullable: true
        scheduledAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        viewCount:
          type: integer
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - status
        - featured
        - breakingNews
        - category
        - authorName
        - createdAt
        - updatedAt
        - viewCount

    ArticleListResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - articles
        - total
        - page
        - limit
        - totalPages

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        shortName:
          type: string
        city:
          type: string
        stadium:
          type: string
        foundedYear:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        secondaryColor:
          type: string
        articleCount:
          type: integer
      required:
        - id
        - name
        - slug
        - shortName
        - city
        - stadium
        - primaryColor
        - secondaryColor
        - articleCount

    TeamWithArticles:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          properties:
            recentArticles:
              type: array
              items:
                $ref: "#/components/schemas/Article"
          required:
            - recentArticles

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        articleCount:
          type: integer
      required:
        - id
        - name
        - slug
        - articleCount

    CreateArticleRequest:
      type: object
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, scheduled]
        featured:
          type: boolean
        breakingNews:
          type: boolean
        category:
          type: string
        authorName:
          type: string
        teamId:
          type: integer
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        sourceName:
          type: string
          nullable: true
        scheduledAt:
          type: string
          nullable: true
      required:
        - title
        - excerpt
        - content
        - status
        - featured
        - breakingNews
        - category
        - authorName

    ScheduleArticleRequest:
      type: object
      properties:
        scheduledAt:
          type: string
      required:
        - scheduledAt

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        shortName:
          type: string
        city:
          type: string
        stadium:
          type: string
        foundedYear:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        secondaryColor:
          type: string
      required:
        - name
        - slug
        - shortName
        - city
        - stadium
        - primaryColor
        - secondaryColor

    NewsSource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        language:
          type: string
        description:
          type: string
        active:
          type: boolean
      required:
        - id
        - name
        - url
        - language
        - description
        - active

    FetchSourceRequest:
      type: object
      properties:
        sourceId:
          type: string
        maxArticles:
          type: integer
          default: 10
        autoImport:
          type: boolean
          default: false
      required:
        - sourceId

    FetchSourceResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/ScrapedArticle"
        imported:
          type: integer
        total:
          type: integer
      required:
        - articles
        - imported
        - total

    ScrapedArticle:
      type: object
      properties:
        title:
          type: string
        originalTitle:
          type: string
        excerpt:
          type: string
        content:
          type: string
        originalUrl:
          type: string
        sourceName:
          type: string
        coverImage:
          type: string
          nullable: true
        publishedAt:
          type: string
          nullable: true
        imported:
          type: boolean
      required:
        - title
        - originalTitle
        - excerpt
        - content
        - originalUrl
        - sourceName
        - imported

    TranslateRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
        sourceName:
          type: string
        sourceLanguage:
          type: string
          default: "es"
      required:
        - title
        - content
        - excerpt
        - sourceName

    TranslateResponse:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        excerpt:
          type: string
      required:
        - title
        - content
        - excerpt

    SiteStats:
      type: object
      properties:
        totalArticles:
          type: integer
        publishedArticles:
          type: integer
        draftArticles:
          type: integer
        scheduledArticles:
          type: integer
        totalTeams:
          type: integer
        totalViews:
          type: integer
        recentArticles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
      required:
        - totalArticles
        - publishedArticles
        - draftArticles
        - scheduledArticles
        - totalTeams
        - totalViews
        - recentArticles
